services:
  auto-bot:
    build:
      context: .
    environment:
      HERMES_HOME: ${HERMES_HOME:-/opt/data}
      CODEX_HOME: ${CODEX_HOME:-/opt/data/.codex}
      CODEX_AUTH_MODE: ${CODEX_AUTH_MODE:-}
      CODEX_ACCESS_TOKEN: ${CODEX_ACCESS_TOKEN:-}
      CODEX_REFRESH_TOKEN: ${CODEX_REFRESH_TOKEN:-}
      CODEX_ID_TOKEN: ${CODEX_ID_TOKEN:-}
      CODEX_ACCOUNT_ID: ${CODEX_ACCOUNT_ID:-}
      SSH_AUTHORIZED_KEY: ${SSH_AUTHORIZED_KEY:-}
      SSH_AUTHORIZED_KEYS: ${SSH_AUTHORIZED_KEYS:-}
      SSH_PORT: ${SSH_PORT:-2222}
      ZEROTIER_AUTOSTART: ${ZEROTIER_AUTOSTART:-0}
      ZEROTIER_NETWORK_ID: ${ZEROTIER_NETWORK_ID:-}
      PORT: 3000
      API_TOKEN: ${WHATSAPP_MANAGER_API_TOKEN:-local-dev-token}
      CORS_ORIGIN: ${WHATSAPP_MANAGER_UI_CORS_ORIGIN:-*}
      BAILEYS_STATE_DIR: ${BAILEYS_STATE_DIR:-/opt/data/whatsapp-manager/baileys}
      WHATSAPP_MEDIA_DIR: ${WHATSAPP_MEDIA_DIR:-/opt/data/whatsapp-manager/media}
      BRIDGE_DATABASE_FILE: ${BRIDGE_DATABASE_FILE:-/opt/data/whatsapp-manager/bridge-state.sqlite}
      BRIDGE_STATE_FILE: ${BRIDGE_STATE_FILE:-}
      AGENT_API_BASE_URL: ${AGENT_API_BASE_URL:-${HERMES_API_BASE_URL:-http://127.0.0.1:8642}}
      AGENT_API_MODEL: ${AGENT_API_MODEL:-${HERMES_API_MODEL:-hermes-agent}}
      HERMES_API_BASE_URL: ${HERMES_API_BASE_URL:-${AGENT_API_BASE_URL:-http://127.0.0.1:8642}}
      HERMES_API_MODEL: ${HERMES_API_MODEL:-${AGENT_API_MODEL:-hermes-agent}}
      WHATSAPP_MANAGER_NATIVE_ADAPTER_ENABLED: ${WHATSAPP_MANAGER_NATIVE_ADAPTER_ENABLED:-auto}
      WHATSAPP_MANAGER_API_URL: ${WHATSAPP_MANAGER_API_URL:-http://127.0.0.1:3000}
      WHATSAPP_MANAGER_API_TOKEN: ${WHATSAPP_MANAGER_API_TOKEN:-local-dev-token}
      WHATSAPP_MANAGER_ALLOW_ALL_USERS: ${WHATSAPP_MANAGER_ALLOW_ALL_USERS:-true}
      WHATSAPP_MANAGER_ALLOWED_USERS: ${WHATSAPP_MANAGER_ALLOWED_USERS:-}
      WHATSAPP_MANAGER_HOME_CHANNEL: ${WHATSAPP_MANAGER_HOME_CHANNEL:-}
      WHATSAPP_MANAGER_POLL_INTERVAL: ${WHATSAPP_MANAGER_POLL_INTERVAL:-1}
      WHATSAPP_MANAGER_PAGE_SIZE: ${WHATSAPP_MANAGER_PAGE_SIZE:-50}
      POSTBACK_RUN_RETENTION_DAYS: ${POSTBACK_RUN_RETENTION_DAYS:-30}
      AGENT_PLATFORM_EVENT_RETENTION_DAYS: ${AGENT_PLATFORM_EVENT_RETENTION_DAYS:-${HERMES_PLATFORM_EVENT_RETENTION_DAYS:-7}}
      HERMES_PLATFORM_EVENT_RETENTION_DAYS: ${HERMES_PLATFORM_EVENT_RETENTION_DAYS:-${AGENT_PLATFORM_EVENT_RETENTION_DAYS:-7}}
      VITE_WHATSAPP_MANAGER_API_URL: ${VITE_WHATSAPP_MANAGER_API_URL:-}
      VITE_WHATSAPP_MANAGER_API_PORT: ${WHATSAPP_MANAGER_API_PORT:-3000}
      VITE_WHATSAPP_MANAGER_UI_TITLE: ${VITE_WHATSAPP_MANAGER_UI_TITLE:-WhatsApp Account Console}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
    ports:
      - "${SSH_PORT:-2222}:${SSH_PORT:-2222}"
      - "${WHATSAPP_MANAGER_API_PORT:-3000}:3000"
      - "${WHATSAPP_MANAGER_UI_PORT:-4173}:4173"
    volumes:
      - ${AUTO_BOT_DATA_DIR:-./data}:/opt/data
      - .:/opt/app
    stdin_open: true
    tty: true
