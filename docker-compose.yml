services:
  auto-bot:
    build:
      context: .
    environment:
      HERMES_HOME: ${HERMES_HOME:-/opt/data}
      CODEX_HOME: ${CODEX_HOME:-/opt/data/.codex}
      CODEX_AUTH_MODE: ${CODEX_AUTH_MODE:-}
      CODEX_ACCESS_TOKEN: ${CODEX_ACCESS_TOKEN:-}
      CODEX_REFRESH_TOKEN: ${CODEX_REFRESH_TOKEN:-}
      CODEX_ID_TOKEN: ${CODEX_ID_TOKEN:-}
      CODEX_ACCOUNT_ID: ${CODEX_ACCOUNT_ID:-}
      SSH_AUTHORIZED_KEY: ${SSH_AUTHORIZED_KEY:-}
      SSH_PORT: ${SSH_PORT:-2222}
      ZEROTIER_AUTOSTART: ${ZEROTIER_AUTOSTART:-0}
      ZEROTIER_NETWORK_ID: ${ZEROTIER_NETWORK_ID:-}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
    ports:
      - "${SSH_PORT:-2222}:${SSH_PORT:-2222}"
    volumes:
      - ${AUTO_BOT_DATA_DIR:-./data}:/opt/data
      - .:/opt/app
    stdin_open: true
    tty: true
    command: ["bash", "-lc", "sleep infinity"]
